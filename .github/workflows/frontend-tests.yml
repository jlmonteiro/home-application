name: Frontend Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: homeapp
          POSTGRES_PASSWORD: homeapp
          POSTGRES_DB: homeapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build Backend
      run: ./gradlew :home-app-backend:bootJar
      working-directory: .

    - name: Start Backend
      run: java -jar home-app-backend/build/libs/*.jar
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/homeapp
      working-directory: .

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install
      working-directory: home-app-frontend

    - name: Run Unit Tests
      run: npm run test:coverage
      working-directory: home-app-frontend

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: home-app-frontend

    - name: Run E2E Tests
      run: npm run test:e2e
      working-directory: home-app-frontend

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: home-app-frontend/playwright-report/
        retention-days: 30
