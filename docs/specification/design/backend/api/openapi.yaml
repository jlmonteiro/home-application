openapi: 3.0.3
info:
  title: Home Application API
  description: |
    REST API for the Home Application - a household management platform.

    ## Features
    - User profile management with Google OAuth2
    - Shopping lists with collaborative updates
    - Store management with loyalty cards and coupons
    - Family hierarchy and age-based access control

    ## Authentication
    All endpoints require a valid Google OAuth2 access token in the Authorization header:
    ```
    Authorization: Bearer {access_token}
    ```

    ## Pagination
    List endpoints use Spring Data's `Pageable` with query parameters:
    - `page` - Page number (0-indexed)
    - `size` - Page size (default 20)
    - `sort` - Sort field (e.g., `name,asc`)

    ## Error Handling
    All errors follow RFC 7807 Problem Detail format.
  version: 1.0.0
  contact:
    name: Home App Team
    url: https://github.com/jlmonteiro/home-application

servers:
  - url: http://localhost:8080/api
    description: Local development server

security:
  - OAuth2: []

paths:
  # ==================== USER PROFILES ====================
  /user/me:
    get:
      summary: Get current user's profile
      tags: [User Profiles]
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserProfileResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update current user's profile
      tags: [User Profiles]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserProfileResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user:
    get:
      summary: List all user profiles (paginated)
      tags: [User Profiles]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: List of user profiles
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PagedUserProfileResource'

  /user/{id}:
    get:
      summary: Get user profile by ID
      tags: [User Profiles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Success
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserProfileResource'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update user profile by ID
      tags: [User Profiles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserProfileResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== USER PREFERENCES ====================
  /user/preferences:
    get:
      summary: Get user preferences
      tags: [User Preferences]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferenceDTO'
    put:
      summary: Update user preferences
      tags: [User Preferences]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferenceDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferenceDTO'

  # ==================== SETTINGS (Adults Only) ====================
  /settings/age-groups:
    get:
      summary: Get age group configuration
      tags: [Settings]
      security:
        - OAuth2: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgeGroupConfigDTO'
        '403':
          description: Only adults can access settings
    put:
      summary: Update age groups and trigger recalculation
      tags: [Settings]
      security:
        - OAuth2: []
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AgeGroupConfigDTO'
      responses:
        '204':
          description: Age groups updated successfully
        '403':
          description: Only adults can access settings

  /settings/roles:
    get:
      summary: Get all family roles
      tags: [Settings]
      security:
        - OAuth2: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FamilyRoleDTO'
        '403':
          description: Only adults can access settings
    post:
      summary: Create a new family role
      tags: [Settings]
      security:
        - OAuth2: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyRoleDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyRoleDTO'
        '403':
          description: Only adults can access settings

  /settings/roles/{id}:
    put:
      summary: Update a family role
      tags: [Settings]
      security:
        - OAuth2: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyRoleDTO'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyRoleDTO'
        '403':
          description: Only adults can access settings
    delete:
      summary: Delete a family role
      tags: [Settings]
      security:
        - OAuth2: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Role deleted successfully
        '403':
          description: Only adults can access settings

