        '201':
          description: Success
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/LoyaltyCardResource'

  /shopping/loyalty-cards/{id}:
    delete:
      summary: Delete a loyalty card
      tags: [Shopping - Stores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Loyalty card deleted successfully

  # ==================== COUPONS ====================
  /shopping/stores/{id}/coupons:
    get:
      summary: List coupons for a store (paginated)
      tags: [Shopping - Stores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Success
          content:
            application/hal+json:
              schema:
