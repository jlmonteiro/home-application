  # ==================== RECIPES ====================
  /recipes:
    get:
      summary: List all recipes (paginated)
      tags: [Recipes]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
