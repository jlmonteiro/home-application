# ==================== COMPONENTS ====================
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          scopes:
            openid: OpenID Connect
            email: Access to email address
            profile: Access to basic profile info
            https://www.googleapis.com/auth/user.birthday.read: Access to birthdate

  schemas:
    # User Profiles
    UserProfileDTO:
      type: object
      properties:
        id:
          description: "Unique identifier for the user profile"
          type: integer
          format: int64
          example: 1
        email:
          description: "User email address (Google account)"
          type: string
          maxLength: 100
          example: "john.doe@gmail.com"
        firstName:
          description: "User first name from Google account"
          type: string
          maxLength: 50
          example: "John"
        lastName:
          description: "User last name from Google account"
          type: string
          maxLength: 50
          example: "Doe"
        enabled:
          description: "Whether the user account is active"
          type: boolean
          example: true
        birthdate:
          description: "User birthdate in ISO 8601 format"
          type: string
          format: date
          example: "1990-05-15"
        familyRoleId:
          description: "ID of the assigned family role"
          type: integer
          format: int64
          example: 1
        familyRoleName:
          description: "Display name of the assigned family role"
          type: string
          example: "Parent"
        ageGroupName:
          description: "Calculated age group (Adult, Teenager, or Child)"
          type: string
          enum: [Adult, Teenager, Child]
          example: "Adult"
        photo:
          description: "Base64-encoded profile photo"
          type: string
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        facebook:
          description: "Facebook profile URL"
          type: string
          pattern: '^$|^https?://(www\\.)?facebook\\.com/.+'
          example: "https://facebook.com/johndoe"
        mobilePhone:
          description: "Mobile phone number"
          type: string
          pattern: '^$|^\\+?[0-9\\s\\-()]{7,20}$'
          example: "+1 (555) 123-4567"
        instagram:
          description: "Instagram profile URL"
          type: string
          pattern: '^$|^https?://(www\\.)?instagram\\.com/.+'
          example: "https://instagram.com/johndoe"
        linkedin:
          description: "LinkedIn profile URL"
          type: string
          pattern: '^$|^https?://(www\\.)?linkedin\\.com/.+'
          example: "https://linkedin.com/in/johndoe"

    UserProfileUpdateRequest:
      type: object
      properties:
        birthdate:
          description: "User birthdate in ISO 8601 format"
          type: string
          format: date
          example: "1990-05-15"
        familyRoleId:
          description: "ID of the assigned family role"
          type: integer
          format: int64
          example: 1
        photo:
          description: "Base64-encoded profile photo"
          type: string
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        facebook:
          description: "Facebook profile URL"
          type: string
          example: "https://facebook.com/johndoe"
        mobilePhone:
          description: "Mobile phone number"
          type: string
          example: "+1 (555) 123-4567"
        instagram:
          description: "Instagram profile URL"
          type: string
          example: "https://instagram.com/johndoe"
        linkedin:
          description: "LinkedIn profile URL"
          type: string
          example: "https://linkedin.com/in/johndoe"
      example:
        birthdate: "1990-05-15"
        familyRoleId: 1
        mobilePhone: "+1 (555) 123-4567"
        facebook: "https://facebook.com/johndoe"

    UserProfileResource:
      allOf:
        - $ref: '#/components/schemas/UserProfileDTO'
        - type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
                  example: "http://localhost:8080/api/user/1"
      example:
        id: 1
        email: "john.doe@gmail.com"
        firstName: "John"
        lastName: "Doe"
        enabled: true
        birthdate: "1990-05-15"
        familyRoleId: 1
        familyRoleName: "Parent"
        ageGroupName: "Adult"
        photo: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        mobilePhone: "+1 (555) 123-4567"
        facebook: "https://facebook.com/johndoe"
        _links:
          self:
            href: "http://localhost:8080/api/user/1"

    PagedUserProfileResource:
      type: object
      properties:
        _embedded:
          description: "Container for embedded resources"
          type: object
          properties:
            userProfileList:
              type: array
              items:
                $ref: '#/components/schemas/UserProfileResource'
        page:
          description: "Pagination metadata"
          type: object
          properties:
            size:
              type: integer
              example: 20
            number:
              type: integer
              example: 0
            totalElements:
              type: integer
              format: int64
              example: 45
            totalPages:
              type: integer
              example: 3
      example:
        _embedded:
          userProfileList:
            - id: 1
              email: "john.doe@gmail.com"
              firstName: "John"
              lastName: "Doe"
              ageGroupName: "Adult"
              _links:
                self:
                  href: "http://localhost:8080/api/user/1"
            - id: 2
              email: "jane.doe@gmail.com"
              firstName: "Jane"
              lastName: "Doe"
              ageGroupName: "Adult"
              _links:
                self:
                  href: "http://localhost:8080/api/user/2"
        page:
          size: 20
          number: 0
          totalElements: 45
          totalPages: 3

    # User Preferences
    UserPreferenceDTO:
      type: object
      properties:
        showShoppingWidget:
          description: "Whether to show shopping widget on dashboard"
          type: boolean
          example: true
        showCouponsWidget:
          description: "Whether to show coupons widget on dashboard"
          type: boolean
          example: true
        version:
          description: "Optimistic locking version for concurrent updates"
          type: integer
          format: int64
          example: 0
      example:
        showShoppingWidget: true
        showCouponsWidget: true
        version: 0

    # Settings
    AgeGroupConfigDTO:
      type: object
      properties:
        id:
          description: "Unique identifier for the user profile"
          type: integer
          format: int64
          example: 1
        name:
          description: 'Name of the configuration (e.g., "Adult", "Parent")'
          type: string
          example: "Adult"
        minAge:
          description: "Minimum age for this age group"
          type: integer
          example: 18
        maxAge:
          description: "Maximum age for this age group"
          type: integer
          example: 99
      example:
        - id: 1
          name: "Child"
          minAge: 0
          maxAge: 12
        - id: 2
          name: "Teenager"
          minAge: 13
          maxAge: 17
        - id: 3
          name: "Adult"
          minAge: 18
          maxAge: 99

    FamilyRoleDTO:
      type: object
      properties:
        id:
          description: "Unique identifier for the user profile"
          type: integer
          format: int64
          example: 1
        name:
          description: 'Name of the configuration (e.g., "Adult", "Parent")'
          type: string
          example: "Parent"
        immutable:
          description: "Whether this role can be deleted"
          type: boolean
          example: true
      example:
        id: 1
        name: "Parent"
        immutable: true

    # Shopping - Catalog
    ShoppingCategoryDTO:
      type: object
      properties:
        id:
          description: "Unique identifier for the user profile"
          type: integer
          format: int64
          example: 1
        name:
          description: "Name of the category"
          type: string
          example: "Dairy"
        icon:
          description: "Icon identifier for visual representation"
          type: string
          example: "cheese"
      example:
