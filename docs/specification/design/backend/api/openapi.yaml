            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListItemDTO'
      responses:
        '201':
          description: Success
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ShoppingListItemResource'

  /shopping/lists/items/{itemId}:
    patch:
      summary: Update list item (e.g., mark as bought)
      tags: [Shopping - Lists]
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListItemDTO'
      responses:
        '200':
          description: Success
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ShoppingListItemResource'
    delete:
      summary: Remove item from list
      tags: [Shopping - Lists]
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Item removed successfully

  /shopping/lists/suggest-price:
    get:
      summary: Get suggested price for an item
      tags: [Shopping - Lists]
      parameters:
        - name: itemId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: storeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: number
                format: decimal

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          scopes:
            openid: OpenID Connect
            email: Access to email address
            profile: Access to basic profile info
            https://www.googleapis.com/auth/user.birthday.read: Access to birthdate

  schemas:
    # User Profiles
    UserProfileDTO:
      type: object
      properties:
        id:
          description: "Unique identifier for the user profile"
          type: integer
          format: int64
          example: 1
        email:
          description: "User email address (Google account)"
          type: string
          maxLength: 100
          example: "john.doe@gmail.com"
        firstName:
          description: "User first name from Google account"
          type: string
          maxLength: 50
          example: "John"
        lastName:
          description: "User last name from Google account"
          type: string
          maxLength: 50
          example: "Doe"
        enabled:
          description: "Whether the user account is active"
          type: boolean
          example: true
        birthdate:
          description: "User birthdate in ISO 8601 format"
          type: string
          format: date
          example: "1990-05-15"
        familyRoleId:
          description: "ID of the assigned family role"
          type: integer
          format: int64
          example: 1
        familyRoleName:
          description: "Display name of the assigned family role"
          type: string
          example: "Parent"
        ageGroupName:
          description: "Calculated age group (Adult, Teenager, or Child)"
          type: string
          enum: [Adult, Teenager, Child]
          example: "Adult"
        photo:
          description: "Base64-encoded profile photo"
          type: string
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        facebook:
          description: "Facebook profile URL"
          type: string
          pattern: '^$|^https?://(www\\.)?facebook\\.com/.+'
          example: "https://facebook.com/johndoe"
        mobilePhone:
          description: "Mobile phone number"
          type: string
          pattern: '^$|^\\+?[0-9\\s\\-()]{7,20}$'
          example: "+1 (555) 123-4567"
        instagram:
          description: "Instagram profile URL"
          type: string
          pattern: '^$|^https?://(www\\.)?instagram\\.com/.+'
          example: "https://instagram.com/johndoe"
        linkedin:
          description: "LinkedIn profile URL"
          type: string
          pattern: '^$|^https?://(www\\.)?linkedin\\.com/.+'
          example: "https://linkedin.com/in/johndoe"

    UserProfileUpdateRequest:
      type: object
      properties:
        birthdate:
          description: "User birthdate in ISO 8601 format"
          type: string
          format: date
          example: "1990-05-15"
        familyRoleId:
          description: "ID of the assigned family role"
          type: integer
          format: int64
          example: 1
        photo:
          description: "Base64-encoded profile photo"
          type: string
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
        facebook:
          description: "Facebook profile URL"
          type: string
          example: "https://facebook.com/johndoe"
        mobilePhone:
          description: "Mobile phone number"
          type: string
          example: "+1 (555) 123-4567"
        instagram:
          description: "Instagram profile URL"
          type: string
          example: "https://instagram.com/johndoe"
        linkedin:
          description: "LinkedIn profile URL"
          type: string
          example: "https://linkedin.com/in/johndoe"
      example:
        birthdate: "1990-05-15"
        familyRoleId: 1
        mobilePhone: "+1 (555) 123-4567"
        facebook: "https://facebook.com/johndoe"

    UserProfileResource:
      allOf:
