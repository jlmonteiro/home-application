          type: string

  # Error Responses
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "https://api.homeapp.com/problems/authentication-required"
              title:
                type: string
                example: "Unauthorized"
              status:
                type: integer
                example: 401
              detail:
                type: string
                example: "Authentication required. Please provide a valid OAuth2 token."
              instance:
                type: string
                example: "/api/user/me"
          example:
            type: "https://api.homeapp.com/problems/authentication-required"
            title: "Unauthorized"
            status: 401
            detail: "Authentication required. Please provide a valid OAuth2 token."
            instance: "/api/user/me"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "https://api.homeapp.com/problems/resource-not-found"
              title:
                type: string
                example: "Not Found"
              status:
                type: integer
                example: 404
              detail:
                type: string
                example: "User profile with ID 999 not found"
              instance:
                type: string
                example: "/api/user/999"
          example:
            type: "https://api.homeapp.com/problems/resource-not-found"
            title: "Not Found"
            status: 404
            detail: "User profile with ID 999 not found"
            instance: "/api/user/999"

    ValidationError:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "https://api.homeapp.com/problems/validation-failed"
              title:
                type: string
                example: "Validation Failed"
              status:
                type: integer
                example: 400
              detail:
                type: string
                example: "One or more fields failed validation"
              instance:
                type: string
                example: "/api/user/me"
              errors:
                type: object
                additionalProperties:
                  type: string
          example:
            type: "https://api.homeapp.com/problems/validation-failed"
            title: "Validation Failed"
            status: 400
            detail: "One or more fields failed validation"
            instance: "/api/user/me"
            errors:
              mobilePhone: "Invalid phone format"
              facebook: "Facebook URL must start with https://facebook.com/"

  # Parameters
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (0-indexed)
      schema:
        type: integer
        default: 0
        example: 0
    SizeParam:
      name: size
      in: query
      description: Number of items per page
      schema:
        type: integer
        default: 20
        example: 20
    SortParam:
      name: sort
      in: query
      description: Sort field and direction (e.g., name,asc)
      schema:
        type: string
        example: name,asc
